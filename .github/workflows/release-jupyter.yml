name: Jupyter Kernel Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tree-sitter-cli
        run: npm install -g tree-sitter-cli

      - name: Generate parser
        working-directory: tree-sitter-ggsql
        run: tree-sitter generate

      - uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-generated
          path: tree-sitter-ggsql/src/

  linux:
    needs: generate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    env:
      GGSQL_SKIP_GENERATE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tree-sitter-generated
          path: tree-sitter-ggsql/src/

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          working-directory: ggsql-jupyter
          manylinux: 2_28
          docker-options: -e GGSQL_SKIP_GENERATE=1
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y unixODBC-devel
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install -y unixodbc-dev
            fi

      - uses: actions/upload-artifact@v4
        with:
          name: jupyter-wheels-linux-${{ matrix.target }}
          path: ggsql-jupyter/dist

  macos:
    needs: generate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64
            runner: macos-15-intel
          - target: aarch64
            runner: macos-15
    env:
      GGSQL_SKIP_GENERATE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tree-sitter-generated
          path: tree-sitter-ggsql/src/

      - name: Install ODBC
        run: brew install unixodbc

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --auditwheel=repair
          working-directory: ggsql-jupyter

      - name: Fix wheel dylib load paths
        uses: ./.github/workflows/actions/fix-macos-wheel-dylibs
        with:
          dist-dir: ggsql-jupyter/dist

      - uses: actions/upload-artifact@v4
        with:
          name: jupyter-wheels-macos-${{ matrix.target }}
          path: ggsql-jupyter/dist

  windows:
    needs: generate
    runs-on: windows-latest
    env:
      GGSQL_SKIP_GENERATE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tree-sitter-generated
          path: tree-sitter-ggsql/src/

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          working-directory: ggsql-jupyter

      - uses: actions/upload-artifact@v4
        with:
          name: jupyter-wheels-windows-x64
          path: ggsql-jupyter/dist

  sdist:
    needs: generate
    runs-on: ubuntu-latest
    env:
      GGSQL_SKIP_GENERATE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tree-sitter-generated
          path: tree-sitter-ggsql/src/

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: ggsql-jupyter

      - uses: actions/upload-artifact@v4
        with:
          name: jupyter-wheels-sdist
          path: ggsql-jupyter/dist

  publish:
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi-jupyter
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: jupyter-wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
