name: "Fix macOS wheel dylib load paths"
description: >
  Relocate bundled dylibs from the py3-none wheel's top-level
  ggsql_jupyter.dylibs/ package into the wheel's .data/data/lib/ dir, so they
  install to <prefix>/lib/ (Python-version-independent) rather than
  <prefix>/lib/pythonX.Y/site-packages/. Also rewrites the binary's load
  commands to match.
inputs:
  dist-dir:
    description: "Directory containing the macOS wheel(s) to rewrite in-place."
    required: true
  binary-name:
    description: "Name of the Mach-O binary inside the wheel's data/scripts dir."
    required: false
    default: "ggsql-jupyter"

runs:
  using: "composite"
  steps:
    - name: Install wheel CLI
      shell: bash
      run: python3 -m pip install --quiet wheel

    - name: Relocate dylibs and rewrite load paths
      shell: bash
      env:
        DIST_DIR: ${{ inputs.dist-dir }}
        BINARY_NAME: ${{ inputs.binary-name }}
      run: |
        set -euo pipefail
        cd "$DIST_DIR"

        shopt -s nullglob
        wheels=(*.whl)
        if [ ${#wheels[@]} -eq 0 ]; then
          echo "::error title=No wheels found::$DIST_DIR contains no .whl files"
          exit 1
        fi

        DYLIBS_SRC="ggsql_jupyter.dylibs"
        OLD_PREFIX="@loader_path/../$DYLIBS_SRC/"
        NEW_PREFIX="@loader_path/../lib/ggsql-jupyter-dylibs/"

        for whl in "${wheels[@]}"; do
          echo "::group::$whl"

          workdir=$(mktemp -d)
          python3 -m wheel unpack "$whl" -d "$workdir"
          unpacked=$(find "$workdir" -maxdepth 1 -mindepth 1 -type d | head -n 1)

          src_dir="$unpacked/$DYLIBS_SRC"
          data_root=$(find "$unpacked" -maxdepth 1 -type d -name '*.data' | head -n 1)
          if [ -z "$data_root" ]; then
            echo "::error title=Wheel layout::no *.data/ directory in $whl"
            exit 1
          fi
          dest_dir="$data_root/data/lib/ggsql-jupyter-dylibs"
          binary=$(find "$data_root/scripts" -type f -name "$BINARY_NAME" | head -n 1)

          if [ -z "$binary" ]; then
            echo "::error title=Binary not found::$BINARY_NAME not found in $whl"
            exit 1
          fi

          if [ ! -d "$src_dir" ]; then
            echo "::warning title=No dylibs bundle::$DYLIBS_SRC/ not present in $whl (nothing to relocate)"
          else
            echo "Moving $DYLIBS_SRC/ -> $(basename "$data_root")/data/lib/ggsql-jupyter-dylibs/"
            mkdir -p "$(dirname "$dest_dir")"
            mv "$src_dir" "$dest_dir"
          fi

          echo "Rewriting load commands on $(basename "$binary")"
          oldpaths=$(otool -L "$binary" | awk -v p="$OLD_PREFIX" 'index($1, p) == 1 {print $1}')
          if [ -z "$oldpaths" ]; then
            echo "::warning title=Nothing to rewrite::No $OLD_PREFIX load commands in $binary"
          else
            for old in $oldpaths; do
              new="$NEW_PREFIX${old##*/}"
              echo "  $old -> $new"
              install_name_tool -change "$old" "$new" "$binary"
            done
          fi

          # Re-codesign all modified Mach-O files with ad-hoc signature
          echo "Re-signing modified Mach-O files"
          codesign --force --sign - "$binary"
          if [ -d "$dest_dir" ]; then
            while IFS= read -r -d '' f; do
              codesign --force --sign - "$f"
            done < <(find "$dest_dir" -type f \( -name '*.dylib' -o -name '*.so' \) -print0)
          fi
          codesign --verify --verbose "$binary"

          # Verify: no stale $OLD_PREFIX references in the binary
          targets=("$binary")
          if [ -d "$dest_dir" ]; then
            while IFS= read -r -d '' f; do targets+=("$f"); done < <(find "$dest_dir" -type f \( -name '*.dylib' -o -name '*.so' \) -print0)
          fi
          stale=0
          for f in "${targets[@]}"; do
            if otool -L "$f" | awk -v p="$OLD_PREFIX" 'index($1, p) == 1 {found=1} END {exit !found}'; then
              echo "::error title=Stale load path::$f still references $OLD_PREFIX"
              otool -L "$f"
              stale=1
            fi
          done
          if [ "$stale" -ne 0 ]; then exit 1; fi

          rm "$whl"
          python3 -m wheel pack "$unpacked" --dest-dir .
          rm -rf "$workdir"

          echo "::endgroup::"
        done
